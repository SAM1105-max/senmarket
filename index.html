<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SenMarket - Marketplace PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0a0a0a;color:white}
header{position:fixed;width:100%;background:#000;padding:20px 10%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #00ff88;z-index:1000}
header h1{color:#00ff88}
nav a{color:white;margin-left:20px;text-decoration:none}
nav a:hover{color:#00ff88}
section{padding:120px 10%}
.section-title{text-align:center;margin-bottom:50px;color:#00ff88}
.hero{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#000,#003d22)}
.hero h2{font-size:3rem;margin-bottom:20px}
.btn{background:#00ff88;color:black;padding:12px 30px;border-radius:50px;text-decoration:none;font-weight:600;transition:0.3s;cursor:pointer}
.btn:hover{background:white;transform:scale(1.05)}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px}
.product-card{background:#111;padding:20px;border-radius:15px;border:1px solid #00ff88;text-align:center;transition:0.3s;position:relative}
.product-card:hover{transform:translateY(-8px)}
.product-card img{width:100%;border-radius:10px;margin-bottom:15px}
.price{color:#00ff88;font-weight:600;margin:10px 0}
button{background:#00ff88;color:black;padding:10px 20px;border:none;border-radius:30px;cursor:pointer;font-weight:600;margin:5px}
button:hover{background:white}
footer{text-align:center;padding:30px;background:black;border-top:1px solid #00ff88}
form input, form textarea{margin-bottom:15px;padding:12px;border-radius:8px;border:none;background:#1a1a1a;color:white;width:100%}
form button{width:fit-content;}
#cartDetails{position:fixed;right:20px;bottom:70px;width:300px;background:#111;border:1px solid #00ff88;border-radius:15px;padding:15px;display:none;z-index:1001}
#cartDetails h3{color:#00ff88;text-align:center;margin-bottom:10px}
.cart-item{display:flex;justify-content:space-between;margin-bottom:8px}
.cart-item button{padding:2px 6px;border-radius:5px;font-size:0.8rem}
#dashboardSales div{border-bottom:1px solid #00ff88;padding:5px 0;}
.hidden{display:none;}
@media(max-width:768px){.hero h2{font-size:2rem} header{flex-direction:column} nav{margin-top:10px} #cartDetails{width:90%}}
</style>
</head>
<body>

<header>
<h1>SenMarket</h1>
<nav>
<a href="#home" class="nav-link">Accueil</a>
<a href="#shop" class="nav-link">Boutique</a>
<a href="#vendor" class="nav-link">Vendeur</a>
<a href="#dashboard" class="nav-link">Dashboard</a>
<a href="#contact" class="nav-link">Contact</a>
</nav>
</header>

<!-- Sections principales -->
<section class="hero" id="home">
<h2>Marketplace Africaine Moderne</h2>
<p>Vendez et achetez partout facilement</p>
<button class="btn" id="startBtn">Démarrer</button>
</section>

<section id="shop">
<h2 class="section-title">Nos Produits</h2>
<div class="products" id="productsContainer"></div>
</section>

<section id="vendor">
<h2 class="section-title">Espace Vendeur</h2>
<form id="productForm">
<input type="text" id="productName" placeholder="Nom du produit" required>
<input type="number" id="productPrice" placeholder="Prix (€)" required>
<input type="text" id="productPriceId" placeholder="Stripe Price ID (optionnel)">
<button type="submit">Ajouter Produit</button>
</form>
<div id="vendorProducts"></div>
</section>

<section id="dashboard">
<h2 class="section-title">Tableau de bord vendeur</h2>
<div id="dashboardSales"></div>
</section>

<section id="contact">
<h2 class="section-title">Contact</h2>
<form action="https://formsubmit.co/tonemail@gmail.com" method="POST">
<input type="text" name="name" placeholder="Votre nom" required>
<input type="email" name="email" placeholder="Votre email" required>
<textarea name="message" rows="5" placeholder="Votre message" required></textarea>
<button type="submit">Envoyer</button>
</form>
</section>

<!-- Formulaire login -->
<section id="login" class="hidden">
<h2 class="section-title">Connexion / Inscription</h2>
<form id="authForm">
<input type="text" id="username" placeholder="Nom d'utilisateur" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Mot de passe" required>
<button type="submit">Se connecter / S'inscrire</button>
</form>
<p id="welcomeMsg"></p>
</section>

<!-- Panier -->
<div class="cart" id="cart">Panier: 0€ (0)</div>
<div id="cartDetails">
<h3>Panier</h3>
<div id="cartItems"></div>
<p id="cartTotal"></p>
<button id="checkoutCart">Payer tout</button>
</div>

<footer>© 2026 SenMarket</footer>

<script src="https://js.stripe.com/v3/"></script>
<script>
// === Stripe setup ===
const stripe = Stripe("pk_test_TA_CLE_PUBLIQUE");

// === Sections et login ===
const authForm = document.getElementById("authForm");
const welcomeMsg = document.getElementById("welcomeMsg");
const loginSection = document.getElementById("login");
const mainSections = ["home","shop","vendor","dashboard","contact"].map(id=>document.getElementById(id));

function showMainSections(){
mainSections.forEach(sec=>sec.classList.remove("hidden"));
loginSection.classList.add("hidden");
}
function hideMainSections(){
mainSections.forEach(sec=>sec.classList.add("hidden"));
loginSection.classList.remove("hidden");
}

// Vérifier si user déjà connecté
const user = localStorage.getItem("user");
if(user){
welcomeMsg.textContent = `Bienvenue, ${user} !`;
showMainSections();
} else {
hideMainSections();
}

// Login / inscription
authForm.addEventListener("submit", e=>{
e.preventDefault();
const username = document.getElementById("username").value;
localStorage.setItem("user",username);
welcomeMsg.textContent = `Bienvenue, ${username} !`;
showMainSections();
});

// Bouton Démarrer
document.getElementById("startBtn").addEventListener("click",()=>{
if(!localStorage.getItem("user")){
hideMainSections(); // affiche login si pas connecté
window.location.href="#login";
} else {
showMainSections();
window.location.href="#home";
}
});

// === Panier ===
let cart=[];
const cartDiv=document.getElementById("cart");
const cartDetails=document.getElementById("cartDetails");
const cartItemsDiv=document.getElementById("cartItems");
const cartTotalP=document.getElementById("cartTotal");

cartDiv.addEventListener("click",()=>cartDetails.style.display=cartDetails.style.display==="none"?"block":"none");

function updateCartDisplay(){
cartItemsDiv.innerHTML="";
let total=0;
cart.forEach((p,i)=>{
total+=p.price;
const div=document.createElement("div");
div.className="cart-item";
div.innerHTML=`${p.name} - ${p.price}€ <button onclick="removeFromCart(${i})">X</button>`;
cartItemsDiv.appendChild(div);
});
cartTotalP.textContent=`Total: ${total}€`;
cartDiv.textContent=`Panier: ${total}€ (${cart.length})`;
}
function addToCart(product){ cart.push(product); updateCartDisplay();}
function removeFromCart(index){ cart.splice(index,1); updateCartDisplay();}

// === Produits ===
let products=[
{name:"Produit 1",price:25,img:"https://via.placeholder.com/300",priceId:"price_xxxxx1"},
{name:"Produit 2",price:40,img:"https://via.placeholder.com/300",priceId:"price_xxxxx2"},
{name:"Produit 3",price:60,img:"https://via.placeholder.com/300",priceId:"price_xxxxx3"}
];
const container=document.getElementById("productsContainer");
function renderProducts(){
container.innerHTML="";
products.forEach(p=>{
const card=document.createElement("div");
card.className="product-card";
card.innerHTML=`<img src="${p.img}" alt="">
<h3>${p.name}</h3>
<p class="price">${p.price}€</p>
<button onclick='addToCart(${JSON.stringify(p)})'>Ajouter</button>
<button class="payBtn" data-price-id="${p.priceId}">Payer maintenant</button>`;
container.appendChild(card);
});
}
renderProducts();

// Ajouter produit par vendeur
const productForm=document.getElementById("productForm");
productForm.addEventListener("submit",function(e){
e.preventDefault();
const name=document.getElementById("productName").value;
const price=parseFloat(document.getElementById("productPrice").value);
const priceId=document.getElementById("productPriceId").value;
const product={name:name,price:price,img:"https://via.placeholder.com/300",priceId:priceId};
products.push(product);
renderProducts();
});

// === Dashboard vendeur ===
let sales=JSON.parse(localStorage.getItem("sales"))||[];
function recordSale(product){ sales.push({...product,date:new Date().toLocaleString()}); localStorage.setItem("sales",JSON.stringify(sales)); renderSales();}
function renderSales(){
const container=document.getElementById("dashboardSales");
container.innerHTML="";
sales.forEach(sale=>{
const div=document.createElement("div");
div.textContent=`${sale.date} : ${sale.name} - ${sale.price}€`;
container.appendChild(div);
});
}
renderSales();

// === Stripe ===
function initStripeButtons(){
document.querySelectorAll(".payBtn").forEach(btn=>{
btn.addEventListener("click",()=>{
const priceId=btn.dataset.priceId;
if(!priceId){alert("Produit non configuré Stripe"); return;}
const productCard=btn.closest(".product-card");
const name=productCard.querySelector("h3").textContent;
const price=parseFloat(productCard.querySelector(".price").textContent);
recordSale({name:name,price:price});
stripe.redirectToCheckout({
lineItems:[{price:priceId,quantity:1}],
mode:'payment',
successUrl:window.location.href+"?success=true",
cancelUrl:window.location.href+"?canceled=true"
});
});
});
}
initStripeButtons();

// Payer tout le panier
document.getElementById("checkoutCart").addEventListener("click",()=>{
if(cart.length===0){alert("Panier vide !"); return;}
const lineItems=[];
cart.forEach(p=>{
if(!p.priceId){alert(`Produit ${p.name} n'a pas de priceId Stripe!`); return;}
lineItems.push({price:p.priceId,quantity:1});
recordSale(p);
});
stripe.redirectToCheckout({
lineItems:lineItems,
mode:'payment',
successUrl:window.location.href+"?success=true",
cancelUrl:window.location.href+"?canceled=true"
});
});
</script>

</body>
</html>
